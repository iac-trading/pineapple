# =============================================================================
# ansible.cfg — Root of pineapple workspace
# =============================================================================

[defaults]
inventory          = ./deploy/ansible/inventory/proxmox/hosts.yml
roles_path         = ./deploy/ansible/roles
collections_path   = ./deploy/ansible/collections
interpreter_python = auto_silent
host_key_checking  = False
retry_files_enabled = False
stdout_callback    = ansible.builtin.default
timeout            = 30

[callback_default]
result_format = yaml

[privilege_escalation]
become          = True
become_method   = sudo
become_ask_pass = False

[ssh_connection]
pipelining = True

[paramiko_connection]
look_for_keys = False
allow_agent = False
host_key_auto_add = True
