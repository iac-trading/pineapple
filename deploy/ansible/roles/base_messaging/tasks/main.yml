---
- name: 00 | Detect docker compose command (v2 or v1)
  ansible.builtin.shell: |
    set -e
    if docker compose version >/dev/null 2>&1; then
      echo "docker compose"
    elif command -v docker-compose >/dev/null 2>&1; then
      echo "docker-compose"
    else
      echo "none"
    fi
  register: _compose_cmd
  changed_when: false

- name: 01 | Fail if Docker Compose is not available
  ansible.builtin.fail:
    msg: "Docker Compose no está disponible. Instala docker-compose-plugin o docker-compose."
  when: _compose_cmd.stdout == "none"

- name: 02 | Set compose command fact
  ansible.builtin.set_fact:
    docker_compose_cmd: "{{ _compose_cmd.stdout }}"

- name: 03 | Wait for Docker daemon
  ansible.builtin.command: docker info
  register: _docker_info
  retries: 20
  delay: 3
  until: _docker_info.rc == 0
  changed_when: false

- name: 04 | Ensure docker network exists
  ansible.builtin.command: "docker network inspect {{ docker_network_name }}"
  register: _net
  changed_when: false
  failed_when: false

- name: 05 | Create docker network if missing
  ansible.builtin.command: "docker network create {{ docker_network_name }}"
  when: _net.rc != 0
  changed_when: true

- name: 06 | Ensure 10_base messaging dir
  ansible.builtin.file:
    path: "{{ platform_compose_dir }}/10_base/messaging"
    state: directory
    mode: "0755"

- name: 07 | Render NATS/Redis compose
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ platform_compose_dir }}/10_base/messaging/docker-compose.yml"
    mode: "0644"

- name: 08 | Deploy NATS/Redis (compose up)
  ansible.builtin.command: "{{ docker_compose_cmd }} up -d --remove-orphans"
  args:
    chdir: "{{ platform_compose_dir }}/10_base/messaging"
  register: _compose_up
  changed_when: "'Started' in _compose_up.stdout or 'Recreated' in _compose_up.stdout or 'Created' in _compose_up.stdout"