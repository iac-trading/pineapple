# =================================================================
# 500 | Proxmox & Controller Bootstrap (Migrated to 10.100.100.x)
# =================================================================
---
- name: 500.1 | Controller | Preparar Máquina Controladora (Localhost)
  hosts: localhost
  connection: local
  become: true
  gather_facts: false
  tags: [ "bootstrap", "controller" ]

  tasks:
    - name: "Controller | Instalar dependencias del sistema para Postgres"
      ansible.builtin.apt:
        name:
          - python3-pip
          - libpq-dev
          - python3-dev
        state: present
        update_cache: yes

    - name: "Controller | Instalar librerías de Python necesarias para Ansible"
      ansible.builtin.pip:
        name:
          - psycopg2-binary
          - docker
          - pandas
        state: present

- name: 500.2 | Proxmox | Crear/Actualizar VMs Consolidadas (V2.0 - 256GB RAM)
  hosts: localhost
  gather_facts: false
  tags: [ "proxmox", "provision" ]

  vars:
    # IP de tu nodo Proxmox físico
    pve_ssh_host: "10.100.100.100"
    # ID de tu VM base/template (Ubuntu/Debian con Cloud-Init)
    template_vmid: 800
    storage_system: "local-lvm"
    net_bridge: "vmbr0"
    vlan_gateway: "10.100.100.1"
    dns_servers: ["10.100.100.1", "1.1.1.1"]
    ssh_wait_timeout: 900

    # CONFIGURACIÓN DE ALTO RENDIMIENTO (AJUSTADA AL LÍMITE DE HARDWARE)
    vms:
      # BRAIN: Orquestación, NATS, Airflow, UI, Grafana
      - { name: "tr-infra-brain-01", vmid: 801, cores: 12, mem: 32768,  root_gb: 200,  ip: "10.100.100.200/24" }
      
      # DATA: TimescaleDB (Optimizado para aprovechar 96GB RAM)
      - { name: "tr-infra-data-01", vmid: 802, cores: 16, mem: 98304,  root_gb: 1000, ip: "10.100.100.201/24" }
      
      # COMPUTE: Agente, Puentes (IBKR/Deriv) y Estrategias LIVE
      - { name: "tr-infra-compute-01", vmid: 803, cores: 16, mem: 65536,  root_gb: 600,  ip: "10.100.100.202/24" }
      
      # LAB: JupyterHub y 30 Trabajadores de Backtesting (Máximo 16 cores por hardware)
      - { name: "tr-infra-lab-01", vmid: 804, cores: 16, mem: 65536,  root_gb: 800,  ip: "10.100.100.203/24" }

  pre_tasks:
    - name: Preparar DNS string
      set_fact:
        dns_string: "{{ dns_servers | join(' ') }}"

  tasks:
    - name: Eliminar VM previa si existe (Limpieza de Nodos 801-804)
      delegate_to: "{{ pve_ssh_host }}"
      become: true
      shell: |
        set -e
        VMID="{{ item.vmid }}"
        if qm status "$VMID" >/dev/null 2>&1; then
          echo "Deteniendo y eliminando VM $VMID existente..."
          qm stop "$VMID" --skiplock 1 >/dev/null 2>&1 || true
          qm destroy "$VMID" --purge 1 --destroy-unreferenced-disks 1
        fi
      args: { executable: /bin/bash }
      loop: "{{ vms }}"
      loop_control: { label: "CLEANUP VM {{ item.vmid }}" }

    - name: Clonar desde template (Full Clone)
      delegate_to: "{{ pve_ssh_host }}"
      become: true
      shell: |
        set -euo pipefail
        qm clone {{ template_vmid }} {{ item.vmid }} --name "{{ item.name }}" --full 1 --storage "{{ storage_system }}"
      args: { executable: /bin/bash }
      loop: "{{ vms }}"
      loop_control: { label: "CLONE {{ item.name }}" }

    - name: Configurar Hardware y Cloud-Init (CPU/RAM/Red/IP Fija)
      delegate_to: "{{ pve_ssh_host }}"
      become: true
      shell: |
        set -euo pipefail
        qm set "{{ item.vmid }}" \
          --cores "{{ item.cores }}" \
          --sockets 1 \
          --memory "{{ item.mem }}" \
          --agent 1 \
          --onboot 1 \
          --scsihw virtio-scsi-pci \
          --cpu host \
          --net0 "virtio,bridge={{ net_bridge }}" \
          --ipconfig0 "ip={{ item.ip }},gw={{ vlan_gateway }}" \
          --nameserver "{{ dns_string }}"
      args: { executable: /bin/bash }
      loop: "{{ vms }}"
      loop_control: { label: "CONFIG {{ item.name }}" }

    - name: Redimensionar disco root
      delegate_to: "{{ pve_ssh_host }}"
      become: true
      shell: "qm resize {{ item.vmid }} scsi0 +{{ item.root_gb }}G"
      args: { executable: /bin/bash }
      loop: "{{ vms }}"
      loop_control: { label: "RESIZE {{ item.name }}" }

    - name: Arrancar nuevas VMs consolidadas
      delegate_to: "{{ pve_ssh_host }}"
      become: true
      shell: "qm start {{ item.vmid }}"
      args: { executable: /bin/bash }
      loop: "{{ vms }}"
      loop_control: { label: "START {{ item.name }}" }

    - name: Esperar conexión SSH en la nueva red
      wait_for:
        host: "{{ (item.ip | string).split('/')[0] }}"
        port: 22
        delay: 10
        timeout: "{{ ssh_wait_timeout }}"
      loop: "{{ vms }}"
      loop_control: { label: "WAIT SSH {{ item.name }}" }
