# SMTP configuration for EDA email alerts
alert_smtp_from: "araya.martinez.rolando@gmail.com"
alert_smtp_smarthost: "smtp.gmail.com"
alert_smtp_user: "araya.martinez.rolando@gmail.com"
# La contraseña se lee del entorno para mayor seguridad
alert_smtp_password: "{{ lookup('env', 'ALERT_SMTP_PASSWORD') | default(lookup('env', 'SMTP_PASSWORD'), true) }}"
# Opcional: separar host y puerto
alert_smtp_port: 587
alert_email_recipient: "araya.martinez.rolando@gmail.com"
platform_root_dir: "/opt/platform" # Directorio raíz de la plataforma
platform_repo_dir: "/home/ansible/pineapple" # Directorio del repositorio
platform_compose_dir: "/opt/platform/compose" # Ruta base para despliegues Docker
docker_network_name: "infra-trade" # Nombre de la red Docker compartida
docker_shared_network: "infra-trade" # Alias para compatibilidad de roles
repo_sync_enabled: true
wazuh_admin_password: "{{ lookup('env', 'WAZUH_ADMIN_PASS') | default('WazuhPass2026!', true) }}"

# Integración Authentik SSO
wazuh_authentik_client_id: "{{ lookup('env', 'WAZUH_AUTHENTIK_CLIENT_ID') | default('wazuh-dashboard', true) }}"
wazuh_authentik_client_secret: "{{ lookup('env', 'WAZUH_AUTHENTIK_CLIENT_SECRET') | default('wazuh_auth_secret_2026', true) }}"
wazuh_authentik_well_known_url: "https://auth.axioquant.local/application/o/wazuh/.well-known/openid-configuration"

# Integración NetBox SSO con Authentik
netbox_authentik_client_id: "{{ lookup('env', 'NETBOX_OIDC_CLIENT_ID') | default('netbox-sso', true) }}"
netbox_authentik_client_secret: "{{ lookup('env', 'NETBOX_OIDC_CLIENT_SECRET') | default('netbox_auth_secret_2026', true) }}"
netbox_authentik_url: "https://auth.axioquant.local/application/o/netbox/"

# Configuración de Seguridad (Valores OBLIGATORIOS desde Infisical)
authentik_secret_key: "{{ lookup('env', 'AUTHENTIK_SECRET_KEY') | default('e3ff17ddfd4b4638a5a07d87fdd15366ce0fc9c92dc5bfe814502bb4230273a4', true) }}"
authentik_db_password: "{{ lookup('env', 'AUTHENTIK_DB_PASSWORD') | default('AuthentikDBPass2026!', true) }}"
infisical_encryption_key: "{{ lookup('env', 'INFISICAL_ENCRYPTION_KEY') | default('3809819833dbf1f40d9ee10f0f537ba55b498c4f3f918588cd4aa1d6e2b8d1f2', true) }}"
infisical_root_key: "{{ lookup('env', 'INFISICAL_ROOT_KEY') | default('6f8823b55dd97bd7fb0975d33d8f0b2f0a0d27cdea5f253241e51247bfcf9a05', true) }}"
infisical_auth_secret: "{{ lookup('env', 'INFISICAL_AUTH_SECRET') | default('629e59702142767c4fead5ab222e6ad54c47f27c2807447e550c898d7f2cad3f', true) }}"

# Configuración de Sincronización
repo_sync_dest: "/home/ansible/pineapple"
repo_sync_src: "/home/aqinfra/pineapple"
ansible_host_brain: "10.100.100.201"
ansible_host_data: "10.100.100.202"

# Endpoints de la Plataforma
platform_endpoints:
  postgres_host: "10.100.100.202"
  postgres_port: 5432
  nats_host: "10.100.100.201"
  nats_url: "nats://{{ nats_user }}:{{ nats_password }}@10.100.100.201:4222"

# Puertos de Infraestructura
nats_client_port: 4222
nats_monitor_port: 8222
nats_route_port: 6222
redis_port: 6379
redis_url: "redis://10.100.100.201:6379"
postgres_port: 5432
postgres_host: "10.100.100.202"

# Interactive Brokers (IBKR)
ibkr_user: "{{ lookup('env', 'IBKR_USER') | default('edemo', true) }}"
ibkr_password: "{{ lookup('env', 'IBKR_PASSWORD') | default('demouser', true) }}"
ibkr_port: 4001
ibkr_client_id: 1

# Credenciales de Infraestructura (NATS/Redis)
nats_user: "{{ lookup('env', 'NATS_USER') | default('nats_admin', true) }}"
nats_password: "{{ lookup('env', 'NATS_PASSWORD') | default('NatsMessagePass2026!', true) }}"
nats_host: "10.100.100.201"
nats_port: 4222
nats_url: "nats://{{ nats_user }}:{{ nats_password }}@{{ nats_host }}:{{ nats_port }}"

# Puertos de Monitorización
prometheus_port: 9090
grafana_port: 3000
