# ==============================================================================
# CONFIGURACIÓN DEL NODO DE CÓMPUTO (CMP) - FACTORY V3
# ==============================================================================

# --- Identidad y Modelo del Agente ---
instance_id: "{{ ansible_hostname }}"
blueprint_id: "factory_standard_agent"
broker: "ibkr"
trading_mode: "live"

# --- Configuración del Bridge IBKR (Variables faltantes) ---
# Apunta al nodo de trading dedicado (VM-AQ-TRADE)
ibkr_host: "10.100.100.205"
ibkr_port: 4002
ibkr_client_id: 1
bridge_health_port: 8889
bridge_meanrev_health_port: 8890

# --- Deriv Contract Mode (bridge_provider = cuenta Tendencia R_25) ---
# "binary"     → CALL/PUT opciones binarias, duración 5m (actual)
# "multiplier" → MULTUP/MULTDOWN con SL/TP reales en USD
deriv_contract_mode: "binary"
deriv_multiplier: 10          # Apalancamiento (5, 10, 20, 50, 100)
deriv_stop_loss_usd: 1.50     # Máxima pérdida por trade en USD
deriv_take_profit_usd: 3.00   # Ganancia objetivo por trade en USD

# --- Red y Puertos de Monitoreo ---
ray_dashboard_port: 8265
factory_agent_enabled: true
repo_sync_enabled: true

