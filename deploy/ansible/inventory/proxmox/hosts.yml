all:
  vars:
    ansible_user: ansible
    ansible_become: true
    ansible_ssh_private_key_file: /home/ansible/.ssh/id_ed25519
    ansible_python_interpreter: /usr/bin/python3
  children:
    # VM 01: ORCHESTRATOR (NATS, Airflow, Grafana, Loki, Vector)
    orc:
      hosts:
        tr-infra-brain-01:
          ansible_host: 10.100.100.200 # 32GB RAM
    # VM 02: DATA (TimescaleDB con 96GB de RAM asignada)
    dat:
      hosts:
        tr-infra-data-01:
          ansible_host: 10.100.100.201
    # VM 03: COMPUTE (Factory Agent, IBKR Gateway, Estrategias LIVE)
    cmp:
      hosts:
        tr-infra-compute-01:
          ansible_host: 10.100.100.202 # 64GB RAM
    # VM 04: LAB (JupyterHub y 30 Backtest Workers)
    lab:
      hosts:
        tr-infra-lab-01:
          ansible_host: 10.100.100.203 # 64GB RAM (Músculo de investigación)
    # EDGE: PERIMETER ROUTER (Cisco 1111-8P — IOS-XE 16.10.1b)
    perimeter_router:
      hosts:
        Perimeter-GW:
          ansible_host: 10.100.100.254   # IP de gestión LAN del router
          ansible_network_os: cisco.ios.ios
          ansible_connection: network_cli
          ansible_network_cli_ssh_type: paramiko  # IOS-XE 16.x requiere KEX legacy (sha1)
          ansible_become: true
          ansible_become_method: enable
          ansible_command_timeout: 120
          ansible_connect_timeout: 60
          ansible_ssh_common_args: '-o PreferredAuthentications=password,keyboard-interactive -o ControlMaster=no'
          ansible_paramiko_look_for_keys: false
          ansible_paramiko_host_key_auto_add: true
          ansible_ssh_private_key_file: ~
