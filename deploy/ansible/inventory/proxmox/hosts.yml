all:
  vars:
    ansible_user: ansible
    ansible_become: true
    ansible_ssh_private_key_file: /home/aqinfra/.ssh/id_ed25519
    ansible_python_interpreter: /usr/bin/python3
  children:
    # VM 01: ORCHESTRATOR (NATS, Airflow, Grafana, Loki, Vector)
    orc:
      hosts:
        VM-AQ-BRAIN:
          ansible_host: 10.100.100.201 # 16GB RAM
    # VM 02: DATA (TimescaleDB con 96GB de RAM asignada)
    dat:
      hosts:
        VM-AQ-DATA:
          ansible_host: 10.100.100.202
    # VM 03: COMPUTE (Factory Agent, Estrategias LIVE)
    cmp:
      hosts:
        VM-AQ-COMPUTE:
          ansible_host: 10.100.100.203 # 48GB RAM
    # VM 04: AI (Ollama y Estrategias IA)
    ai:
      hosts:
        VM-AQ-IA:
          ansible_host: 10.100.100.204 # 64GB RAM
    # VM 05: TRADE (Forex, IBKR Gateway y otros proveedores)
    trd:
      hosts:
        VM-AQ-TRADE:
          ansible_host: 10.100.100.205 # 64GB RAM
    # EDGE: PERIMETER ROUTER (Cisco 1111-8P — IOS-XE 16.10.1b)
    perimeter_router:
      hosts:
        Perimeter-GW:
          ansible_host: 10.100.100.254   # IP de gestión LAN del router
          ansible_network_os: cisco.ios.ios
          ansible_connection: network_cli
          ansible_network_cli_ssh_type: paramiko
          ansible_become: true
          ansible_become_method: enable
          ansible_command_timeout: 120
          ansible_connect_timeout: 60
          ansible_ssh_common_args: '-o PreferredAuthentications=password,keyboard-interactive -o ControlMaster=no'
          ansible_paramiko_look_for_keys: false
          ansible_paramiko_host_key_auto_add: true
          ansible_ssh_private_key_file: ~
